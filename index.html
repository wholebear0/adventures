<!DOCTYPE html>
<html>
<head>
  <title>Google Map – Side Panel</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito+Basic:wght@400;600&display=swap" rel="stylesheet">

  <style>

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Nunito Basic', sans-serif;
      color: white;
      background: #1f1f1f;
    }


    #wrapper {
      display: flex;
      height: 600px;
      width: 100%;
    }


    /* MAP */
    #map {
      flex: 1;
    }


    /* SIDE PANEL */

    #sidePanel {
      width: 320px;
      background: #2b2b2b;
      border-left: 2px solid #444;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }


    #sidePanel img {
      width: 100%;
      display: block;
      border-bottom: 1px solid #444;
    }


    .content {
      padding: 14px;
      font-size: 13px;
    }


    .content p {
      margin: 6px 0;
    }


    .content strong {
      color: #ffffff;
    }



    /* DETAILS BUTTON */

    .details-btn {

      margin-top: 12px;

      padding: 10px;

      background: #444;

      color:white;

      border:1px solid #666;

      border-radius:6px;

      cursor:pointer;

      width:100%;

    }



    /* FILTERS */

    #filters {

      position:absolute;

      z-index:999;

      background:white;

      color:black;

      padding:10px;

      margin:10px;

      border-radius:6px;

      box-shadow:0 2px 6px rgba(0,0,0,.3);

      font-family:Arial,sans-serif;

    }



    /************************************
       CARDS
    ************************************/


    #cards-section {

      padding:40px;

    }


    #cards-section h2 {

      text-align:center;

      font-size:32px;

      margin-bottom:30px;

    }



    #cards-container {

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(300px,1fr));

      gap:25px;

    }



    .trip-card {

      background:#2b2b2b;

      border-radius:10px;

      overflow:hidden;

      cursor:pointer;

      box-shadow:
        0 3px 8px rgba(0,0,0,.3);

    }



    .trip-card img {

      width:100%;

      height:220px;

      object-fit:cover;

    }



    .trip-card-content {

      padding:18px;

    }



    .trip-card-title {

      font-size:22px;

      font-weight:600;

      margin-bottom:12px;

    }



    .trip-card-content p {

      margin:5px 0;

      font-size:14px;

    }




    /* MOBILE */

    @media(max-width:768px){


      #sidePanel {

        display:none !important;

      }


      #wrapper {

        height:500px;

      }


      #cards-section {

        padding:20px;

      }


    }


  </style>

</head>



<body>



<div id="filters">

  <label>

  Type:

    <select id="typeFilter">

      <option value="All">All</option>

      <option value="Hike">Hike</option>

      <option value="Backpack">Backpack</option>

      <option value="Kayak">Kayak</option>

      <option value="Other">Other</option>

    </select>

  </label>

</div>




<div id="wrapper">


  <div id="map"></div>


  <div id="sidePanel">

    <div id="panelContent" class="content">

      <p>Select a trip</p>

    </div>

  </div>


</div>




<section id="cards-section">


<h2>Latest Adventures</h2>


<div id="cards-container"></div>


</section>





<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMCxxUBxZ-a2UyHwu5PbKwYBxvAo0bAAA"></script>




<script>


const map = new google.maps.Map(
document.getElementById("map"),
{

center:{
lat:36.805098,
lng:-109.822512
},

zoom:6,

mapTypeId:
google.maps.MapTypeId.TERRAIN,

disableDefaultUI:true,

gestureHandling:"greedy"

});





function isDesktop(){

return window.innerWidth > 768;

}





function generatePageUrl(title){

return "trips/" +

title.toLowerCase()
.replace(/[^\w\s-]/g,"")
.replace(/\s+/g,"-")

+".html";

}





function updatePanel(data){


if(!isDesktop())
return;



const panel =
document.getElementById("panelContent");



panel.innerHTML = `


${data.photoUrl ?
`<img src="${data.photoUrl}">`
:""}


<p><strong>Title:</strong> ${data.title}</p>

<p><strong>Type:</strong> ${data.type || ""}</p>

<p><strong>Where:</strong> ${data.area || ""}</p>

<p><strong>Date:</strong> ${data.date || ""}</p>

<p><strong>Miles:</strong> ${data.miles || ""}</p>

<p><strong>Elevation Gain:</strong> ${data.elevationGain || ""}</p>

<p><strong>Overall Ranking:</strong> ${data.overallRanking || ""}</p>


<button class="details-btn">
Details
</button>


`;



panel.querySelector(".details-btn")
.onclick=(e)=>{

e.stopPropagation();

window.open(
generatePageUrl(data.title),
"_blank"
);

};



panel.onclick=()=>{

window.open(
generatePageUrl(data.title),
"_blank"
);

};



}






function getMarkerIcon(type){

switch((type||"").toLowerCase()){


case "hike":
return "http://maps.google.com/mapfiles/ms/icons/blue-dot.png";


case "backpack":
return "http://maps.google.com/mapfiles/ms/icons/red-dot.png";


case "kayak":
return "http://maps.google.com/mapfiles/ms/icons/green-dot.png";


case "other":
return "http://maps.google.com/mapfiles/ms/icons/yellow-dot.png";


default:
return null;


}


}





let allMarkers=[];

let allData=[];





function createCards(trips){


const container =
document.getElementById("cards-container");


container.innerHTML="";



trips

.sort((a,b)=>
new Date(b.date)-new Date(a.date)
)

.slice(0,45)

.forEach(d=>{


const card =
document.createElement("div");



card.className="trip-card";



card.innerHTML = `


${d.photoUrl ?
`<img src="${d.photoUrl}">`
:""}



<div class="trip-card-content">


<div class="trip-card-title">

${d.title}

</div>


<p><strong>Type:</strong> ${d.type || ""}</p>

<p><strong>Where:</strong> ${d.area || ""}</p>

<p><strong>Date:</strong> ${d.date || ""}</p>

<p><strong>Miles:</strong> ${d.miles || ""}</p>

<p><strong>Elevation Gain:</strong> ${d.elevationGain || ""}</p>

<p><strong>Overall Ranking:</strong> ${d.overallRanking || ""}</p>


</div>


`;



card.onclick=()=>{


window.open(
generatePageUrl(d.title),
"_blank"
);


};



container.appendChild(card);



});


}







async function loadMarkers(){


const res =
await fetch(
"https://script.google.com/macros/s/AKfycbweollfSW_IlQr6nka0s77-WPu4sIdIDDpmq0Z9NV0egq0c-8dVcO4nevotzZM6jA4T/exec"
);



const data =
await res.json();



allData =
data.mapMarkers;



createCards(allData);



let mostRecent=null;



allData.forEach((d)=>{


const marker =
new google.maps.Marker({

position:d.position,

map,

icon:getMarkerIcon(d.type)

});



marker.type=d.type;



marker.data=d;



marker.addListener(
"click",
()=>updatePanel(d)
);



allMarkers.push(marker);



if(!mostRecent ||
new Date(d.date)>new Date(mostRecent.date))

{

mostRecent=d;

}



});



if(isDesktop() && mostRecent){

updatePanel(mostRecent);

}


}






document
.getElementById("typeFilter")
.addEventListener(
"change",
function(){


const selected =
this.value.toLowerCase();



allMarkers.forEach(marker=>{


if(selected==="all"){

marker.setMap(map);

}

else{


marker.setMap(

marker.type &&
marker.type.toLowerCase()===selected

?map:null

);


}


});


});





loadMarkers();



</script>



</body>
</html>
