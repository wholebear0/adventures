<!DOCTYPE html>
<html>

<head>

<title>Adventures</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Basic:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">


<style>

html, body {

  margin:0;

  padding:0;

  font-family:'Nunito Basic', sans-serif;

  color:white;

  background:#1f1f1f;

}


/**************************************
 MAP AREA
**************************************/

#wrapper {

  display:flex;

  width:100%;

  height:600px;

}


#map {

  flex:1;

}



/**************************************
 SIDE PANEL
**************************************/

#sidePanel {

  width:320px;

  background:#2b2b2b;

  border-left:2px solid #444;

  overflow-y:auto;

}


#sidePanel img {

  width:100%;

}



.content {

  padding:14px;

  font-size:13px;

}



.content p {

  margin:6px 0;

}



/**************************************
 BUTTON
**************************************/

.details-btn {

  margin-top:12px;

  padding:10px;

  background:#444;

  color:white;

  border:1px solid #666;

  border-radius:6px;

  cursor:pointer;

  width:100%;

}



/**************************************
 FILTER
**************************************/

#filters {

  position:absolute;

  z-index:999;

  background:white;

  color:black;

  padding:10px;

  margin:10px;

  border-radius:6px;

}



@media(max-width:768px){


  #sidePanel {

    display:none;

  }


  #wrapper {

    height:500px;

  }


}



</style>

</head>



<body>


<div id="filters">

<label>

Type:

<select id="typeFilter">

<option value="All">All</option>

<option value="Hike">Hike</option>

<option value="Backpack">Backpack</option>

<option value="Kayak">Kayak</option>

<option value="Other">Other</option>

</select>

</label>

</div>




<div id="wrapper">


<div id="map"></div>



<div id="sidePanel">

<div id="panelContent" class="content">

<p>Select a trip</p>

</div>

</div>


</div>





<section class="cards-section">


<h2>Latest Adventures</h2>


<div id="cards-container" class="cards-grid"></div>


</section>






<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMCxxUBxZ-a2UyHwu5PbKwYBxvAo0bAAA"></script>



<script>


const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbweollfSW_IlQr6nka0s77-WPu4sIdIDDpmq0Z9NV0egq0c-8dVcO4nevotzZM6jA4T/exec";



const map =
new google.maps.Map(
document.getElementById("map"),
{

center:{
lat:36.805098,
lng:-109.822512
},

zoom:6,

mapTypeId:
google.maps.MapTypeId.TERRAIN,

disableDefaultUI:true,

gestureHandling:"greedy"

});





function generatePageUrl(title){


return "trips/" +

title
.toLowerCase()
.replace(/[^\w\s-]/g,"")
.replace(/\s+/g,"-")

+".html";


}





function updatePanel(data){


const panel =
document.getElementById("panelContent");



panel.innerHTML = `


${data.imageUrl ?
`<img src="${data.imageUrl}">`
:""}



<p><strong>Title:</strong>
${data.title}</p>


<p><strong>Area:</strong>
${data.area || ""}</p>


<p><strong>Date:</strong>
${data.date || ""}</p>


<p><strong>Miles:</strong>
${data.miles || ""}</p>


<p><strong>Elevation:</strong>
${data.elevationGain || ""}</p>



<button class="details-btn">
Details
</button>


`;



panel.querySelector("button")
.onclick=()=>{


window.open(
generatePageUrl(data.title),
"_blank"
);


};



}






function getMarkerIcon(type){


switch((type||"").toLowerCase()){


case "hike":
return "http://maps.google.com/mapfiles/ms/icons/blue-dot.png";


case "backpack":
return "http://maps.google.com/mapfiles/ms/icons/red-dot.png";


case "kayak":
return "http://maps.google.com/mapfiles/ms/icons/green-dot.png";


case "other":
return "http://maps.google.com/mapfiles/ms/icons/yellow-dot.png";


default:
return null;


}


}




let allMarkers=[];

let allData=[];





function createCards(trips){


const container =
document.getElementById(
"cards-container"
);



container.innerHTML="";



trips

.sort((a,b)=>
new Date(b.date)-new Date(a.date)
)

.slice(0,45)

.forEach(trip=>{


const card =
document.createElement("div");



card.className="card";



card.innerHTML=`

<img src="${trip.imageUrl || ""}">


<div class="card-content">


<div class="card-title">

${trip.title}

</div>



<div class="card-details">

📍 ${trip.area || ""}<br>

📅 ${trip.date || ""}<br>

🥾 ${trip.miles || ""} miles<br>

⛰ ${trip.elevationGain || ""} ft


</div>


</div>

`;



card.onclick=()=>{

window.open(
generatePageUrl(trip.title),
"_blank"
);

};



container.appendChild(card);



});


}





async function loadMarkers(){


const res =
await fetch(SCRIPT_URL);



const data =
await res.json();



allData =
data.cardItems || data.mapMarkers || data;



createCards(allData);



let mostRecent=null;



allData.forEach(d=>{



if(!d.position)
return;



const marker =
new google.maps.Marker({

position:d.position,

map,

icon:getMarkerIcon(d.type)

});



marker.type=d.type;

marker.data=d;



marker.addListener(
"click",
()=>updatePanel(d)
);



allMarkers.push(marker);




if(
!mostRecent ||
new Date(d.date)>new Date(mostRecent.date)
)

{

mostRecent=d;

}



});



if(mostRecent){

updatePanel(mostRecent);

}


}






document
.getElementById("typeFilter")
.addEventListener(
"change",
function(){



const selected =
this.value.toLowerCase();



allMarkers.forEach(marker=>{


if(selected==="all"){

marker.setMap(map);

}

else{


marker.setMap(

marker.type &&
marker.type.toLowerCase()===selected

?map:null

);


}


});


});





loadMarkers();



</script>


</body>

</html>
