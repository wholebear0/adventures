<!DOCTYPE html>
<html>
<head>
<title>Google Map – Side Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Basic:wght@400;600&display=swap" rel="stylesheet">
<style>
html,body{
margin:0;
padding:0;
font-family:'Nunito Basic',sans-serif;
color:white;
background:#333;
}
#wrapper{
display:flex;
height:700px;
max-width:1600px;
margin:0 auto;
}
#map{
flex:1;
}

#sidePanel{
width:340px;
background:#2b2b2b;
border-left:2px solid #444;
overflow-y:auto;
display:flex;
flex-direction:column;
}
#sidePanel img{
width:100%;
display:block;
}
.content{
padding:14px;
font-size:13px;
}
.content p{
margin:6px 0;
}
.details-btn{
margin-top:12px;
padding:10px;
background:#444;
color:white;
border:1px solid #666;
border-radius:6px;
cursor:pointer;
width:100%;
}

*{
box-sizing:border-box;
}


/* Entire top ribbon */

#adventureToolbar{
max-width:1600px;
margin:0 auto;
box-sizing:border-box;
position:sticky;
top:0;
z-index:1000;

display:grid;
grid-template-columns:minmax(540px,1fr) auto minmax(540px,1fr);
align-items:center;
gap:20px;

width:100%;
min-width:1280px;
height:58px;
padding:7px 28px 7px 18px;

background:#333;
border-bottom:1px solid #555;
}


/* Allows the ribbon to scroll rather than overlap */

#toolbarScroll{
width:100%;
overflow:visible;
background:#333;
}


/* Left legend */

.type-legend{
grid-column:1;

display:flex;
align-items:center;
justify-content:flex-start;
gap:9px;

white-space:nowrap;
}

.legend-title{
font-size:13px;
font-weight:600;
}

.legend-item{
display:inline-flex;
align-items:center;
gap:5px;

font-size:13px;
white-space:nowrap;
}

.legend-dot{
display:inline-block;

width:13px;
height:13px;

border:1px solid rgb(37, 35, 35);
border-radius:50%;
}

.legend-dot.hike{
background:#2d72d9;
}

.legend-dot.backpack{
background:#d83a34;
}

.legend-dot.kayak{
background:#36a852;
}

.legend-dot.other{
background:#f2cf3a;
}


/* Truly centered title */

.adventures-title{
grid-column:2;
justify-self:center;

margin:0;

font-size:26px;
font-weight:600;
line-height:1;
text-align:center;
white-space:nowrap;
}


/* Right filters */

#filters{
grid-column:3;

display:flex;
align-items:center;
justify-content:flex-end;
gap:9px;

padding-right:8px;
white-space:nowrap;
}

#filters label{
display:flex;
align-items:center;
gap:5px;

margin:0;

font-size:13px;
white-space:nowrap;
}

#filters select,
#filters input,
#otherFiltersButton{
font-family:inherit;
font-size:13px;
}

#filters select{
height:32px;
min-width:76px;
padding:4px 7px;

font-size:13px;
color:white;
background:#242424;

border:1px solid #666;
border-radius:5px;
}

.miles-filter input[type="range"]{
width:82px;
padding:0;
}

#milesValue{
display:inline-block;
min-width:15px;
text-align:right;
}


/* Other Filters dropdown */

.other-filters{
position:relative;
flex:0 0 auto;
}

#otherFiltersButton{
height:30px;
margin:0;
padding:4px 9px;

color:white;
background:#242424;

border:1px solid #666;
border-radius:5px;

cursor:pointer;
white-space:nowrap;
}

#otherFiltersMenu{
position:absolute;
top:calc(100% + 8px);
right:0;

display:none;
width:280px;
padding:15px;

background:#2b2b2b;
border:1px solid #666;
border-radius:8px;

box-shadow:0 8px 20px rgba(0,0,0,.4);
}

#otherFiltersMenu.open{
display:grid;
gap:14px;
}

#otherFiltersMenu label{
display:grid;
align-items:stretch;
gap:5px;

font-size:12px;
}

#otherFiltersMenu select,
#otherFiltersMenu input[type="range"]{
width:100%;
}

#cards-section{
padding:40px;
}
#cards-section h2{
text-align:center;
font-size:26px;
margin-bottom:30px;
}
#cards-container{
display:grid;
grid-template-columns:repeat(4,340px);
justify-content:center;
gap:25px;
}
@media(max-width:1400px){

#cards-container{
grid-template-columns:repeat(3,320px);
}

}

@media(max-width:1050px){

#cards-container{
grid-template-columns:repeat(2,320px);
}

}

@media(max-width:720px){

#cards-container{
grid-template-columns:minmax(0,320px);
}

}
.trip-card{
background:#2b2b2b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,.3);
}
.trip-card img{
width:100%;
height:220px;
object-fit:cover;
}
.trip-card-type-bar{
height:4px;
width:100%;
border-radius:10px 10px 0 0;
}
.trip-card-content{
padding:18px;
}
.trip-card-title{
font-size:22px;
font-weight:600;
margin-bottom:12px;
}
.trip-card-content p{
margin:5px 0;
font-size:14px;
}
#pagination{
text-align:center;
margin:30px;
}
.page-btn{
margin:3px;
padding:6px 12px;
cursor:pointer;
}
.page-btn.active{
background:#666;
color:white;
}
@media(max-width:768px){
#sidePanel{
display:none;
}
#wrapper{
height:500px;
}
#cards-section{
padding:20px;
}
}
</style>
</head>
<body>

<div id="toolbarScroll">

<header id="adventureToolbar">

<!-- LEFT: Marker legend -->

<div class="type-legend">

<span class="legend-title"></span>

<span class="legend-item">
<span class="legend-dot hike"></span>
Hike
</span>

<span class="legend-item">
<span class="legend-dot backpack"></span>
Backpack
</span>

<span class="legend-item">
<span class="legend-dot kayak"></span>
Kayak
</span>

<span class="legend-item">
<span class="legend-dot other"></span>
Other
</span>

</div>


<!-- CENTER: Title -->

<h1 class="adventures-title">Adventures</h1>


<!-- RIGHT: Filters -->

<div id="filters">

<label>
<span>Type:</span>

<select id="typeFilter">
<option value="All">All</option>
</select>
</label>


<label>
<span>Year:</span>

<select id="yearFilter">
<option value="All">All</option>
</select>
</label>


<label class="miles-filter">

<span>Miles greater than:</span>

<input
id="milesSlider"
type="range"
min="0"
max="50"
value="0"
>

<span>
<span id="milesValue">0</span> mi
</span>

</label>


<div class="other-filters">

<button
id="otherFiltersButton"
type="button"
aria-expanded="false"
aria-controls="otherFiltersMenu"
>
Other Filters ▾
</button>


<div id="otherFiltersMenu">

<label>

<span>State:</span>

<select id="stateFilter">
<option value="All">All</option>
</select>

</label>


<label>

<span>Country:</span>

<select id="countryFilter">
<option value="All">All</option>
</select>

</label>


<label>

<span>Elevation Gain greater than:</span>

<input
id="elevationSlider"
type="range"
min="0"
max="10000"
step="1000"
value="0"
>

<span>
<span id="elevationValue">0</span> ft
</span>

</label>

</div>

</div>

</div>

</header>

</div>    

<div id="wrapper">
<div id="map">

<div id="mapLoading" class="loading-message">
Loading map…
</div>

</div>

<div id="sidePanel">
<div id="panelContent" class="content">
<p>Select a trip</p>
</div>
</div>
</div>


<section id="cards-section">
<h2>Latest Adventures</h2>
<div id="cards-container"></div>
</section>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMCxxUBxZ-a2UyHwu5PbKwYBxvAo0bAAA"></script>


<script>

const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:36.805098,lng:-109.822512},
zoom:6,
mapTypeId:google.maps.MapTypeId.TERRAIN,
disableDefaultUI:true,
gestureHandling:"greedy"
});


function isDesktop(){
return window.innerWidth>768;
}


function generatePageUrl(title){
return "trips/"+title.toLowerCase()
.replace(/[^\w\s-]/g,"")
.replace(/\s+/g,"-")+".html";
}


function updatePanel(data){

if(!isDesktop()) return;

const panel=document.getElementById("panelContent");

panel.innerHTML=`

${data.photoUrl ? `<img src="${data.photoUrl}">`:""}

<p><strong>Title:</strong> ${data.title}</p>
<p><strong>Type:</strong> ${data.type||""}</p>
<p><strong>Where:</strong> ${data.area||""}</p>
<p><strong>Date:</strong> ${data.date||""}</p>
<p><strong>Miles:</strong> ${data.miles||""}</p>
<p><strong>Elevation Gain:</strong> ${data.elevationGain||""}</p>
<p><strong>Overall Ranking:</strong> ${data.overallRanking||""}</p>

<button class="details-btn">Details</button>

`;

panel.querySelector(".details-btn").onclick=(e)=>{
e.stopPropagation();
window.open(generatePageUrl(data.title),"_blank");
};

panel.onclick=()=>{
window.open(generatePageUrl(data.title),"_blank");
};

}



function getMarkerIcon(type){

switch((type||"").toLowerCase()){

case "hike":
return "http://maps.google.com/mapfiles/ms/icons/blue-dot.png";

case "backpack":
return "http://maps.google.com/mapfiles/ms/icons/red-dot.png";

case "kayak":
return "http://maps.google.com/mapfiles/ms/icons/green-dot.png";

case "other":
return "http://maps.google.com/mapfiles/ms/icons/yellow-dot.png";

default:
return null;

}

}



let allMarkers=[];
let allData=[];
let filteredData=[];
let currentPage=1;



function createCards(trips){

const container=document.getElementById("cards-container");
container.innerHTML="";

const perPage=16;

const sorted=[...trips].sort((a,b)=>new Date(b.date)-new Date(a.date));

const totalPages=Math.ceil(sorted.length/perPage);

if(currentPage>totalPages) currentPage=1;

const start=(currentPage-1)*perPage;


sorted.slice(start,start+perPage).forEach(d=>{

const card=document.createElement("div");

card.className="trip-card";

card.innerHTML=`

<div
class="trip-card-type-bar"
style="background:${
d.type === "Hike" ? "#2d72d9" :
d.type === "Backpack" ? "#d83a34" :
d.type === "Kayak" ? "#36a852" :
d.type === "Other" ? "#f2cf3a" :
"#777"
};">
</div>

${d.photoUrl ? `<img src="${d.photoUrl}">`:""}

<div class="trip-card-content">

<div class="trip-card-title">${d.title}</div>

<p><strong>Type:</strong> ${d.type||""}</p>
<p><strong>Where:</strong> ${d.area||""}</p>
<p><strong>Date:</strong> ${d.date||""}</p>
<p><strong>Miles:</strong> ${d.miles||""}</p>
<p><strong>Elevation Gain:</strong> ${d.elevationGain||""}</p>
<p><strong>Overall Ranking:</strong> ${d.overallRanking||""}</p>

</div>
`;

card.onclick=()=>{
window.open(generatePageUrl(d.title),"_blank");
};

container.appendChild(card);

});

createPagination(totalPages);

}

function createPagination(totalPages){

let old=document.getElementById("pagination");
if(old) old.remove();

const div=document.createElement("div");
div.id="pagination";

for(let i=1;i<=totalPages;i++){

const btn=document.createElement("button");

btn.className="page-btn";
btn.innerText=i;

if(i===currentPage){
btn.classList.add("active");
}

btn.onclick=()=>{

currentPage=i;

createCards(filteredData);

document.getElementById("cards-section")
.scrollIntoView({
behavior:"smooth"
});

};

div.appendChild(btn);

}

document.getElementById("cards-container").before(div);

}



function populateFilters(){

function addOptions(id,values){

const select=document.getElementById(id);

[...new Set(values.filter(v=>v!==undefined && v!==null && v!==""))]
.sort()
.forEach(v=>{

const option=document.createElement("option");

option.value=v;
option.textContent=v;

select.appendChild(option);

});

}


addOptions("typeFilter",allData.map(x=>x.type));

addOptions("yearFilter",
allData.map(x=>new Date(x.date).getFullYear())
);

addOptions("stateFilter",allData.map(x=>x.state));

addOptions("countryFilter",allData.map(x=>x.country));

}

function applyFilters(){

filteredData=allData.filter(d=>{


let type=document.getElementById("typeFilter").value;

let year=document.getElementById("yearFilter").value;

let state=document.getElementById("stateFilter").value;

let country=document.getElementById("countryFilter").value;

let milesSlider=
Number(document.getElementById("milesSlider").value);

let elevationSlider=
Number(document.getElementById("elevationSlider").value);


let miles=Number(d.miles)||0;

let elevation=parseInt(d.elevationGain)||0;



if(type!=="All" && d.type!==type)
return false;


if(year!=="All" &&
new Date(d.date).getFullYear()!=Number(year))
return false;


if(state!=="All" && d.state!==state)
return false;


if(country!=="All" && d.country!==country)
return false;


if(miles < milesSlider)
return false;


if(elevation < elevationSlider)
return false;


return true;


});


createCards(filteredData);


/* Make marker filtering faster */

const filteredSet=new Set(filteredData);

allMarkers.forEach(marker=>{

marker.setMap(
filteredSet.has(marker.data)
?map
:null
);

});

}



document.querySelectorAll("#filters select")
.forEach(select=>{

select.addEventListener("change",()=>{

currentPage=1;
applyFilters();

});

});



document.getElementById("milesSlider")
.addEventListener("input",function(){

document.getElementById("milesValue").innerText=this.value;

currentPage=1;

applyFilters();

});



document.getElementById("elevationSlider")
.addEventListener("input",function(){

document.getElementById("elevationValue").innerText=this.value;

currentPage=1;

applyFilters();

});






async function loadMarkers(){

const res=await fetch(
"https://script.google.com/macros/s/AKfycbxmcar1lRakOBIXfemcSlT_9yMDL5ZVcrEeKs1tr7cuEoD6I8T6Y8_wLR-FHGbAm0zF/exec"
);

const data=await res.json();


allData=data.mapMarkers;

filteredData=allData;


populateFilters();

createCards(allData);



let mostRecent=null;


allData.forEach(d=>{

  if (!d.position) {
    console.warn("Missing map position:", d.title);
    return;
  }

  const marker=new google.maps.Marker({
    position:d.position,
    map,
    icon:getMarkerIcon(d.type)
  });


marker.type=d.type;

marker.data=d;


marker.addListener("click",()=>{

updatePanel(d);

});


allMarkers.push(marker);



if(!mostRecent ||
new Date(d.date)>new Date(mostRecent.date)){

mostRecent=d;

}


});



if(isDesktop() && mostRecent){

updatePanel(mostRecent);

}


}


const otherFiltersButton=
document.getElementById("otherFiltersButton");

const otherFiltersMenu=
document.getElementById("otherFiltersMenu");


otherFiltersButton.addEventListener("click",function(event){

event.stopPropagation();

const isOpen=
otherFiltersMenu.classList.toggle("open");

otherFiltersButton.setAttribute(
"aria-expanded",
String(isOpen)
);

});


otherFiltersMenu.addEventListener("click",function(event){

event.stopPropagation();

});


document.addEventListener("click",function(){

otherFiltersMenu.classList.remove("open");

otherFiltersButton.setAttribute(
"aria-expanded",
"false"
);

});


document.addEventListener("keydown",function(event){

if(event.key==="Escape"){

otherFiltersMenu.classList.remove("open");

otherFiltersButton.setAttribute(
"aria-expanded",
"false"
);

}

});
loadMarkers();


</script>

</body>
</html>
