<!DOCTYPE html>
<html>
<head>
<title>Google Map – Side Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Basic:wght@400;600&display=swap" rel="stylesheet">
<style>
html,body{
margin:0;
padding:0;
font-family:"Playwrite NZ Basic", cursive;
color:white;
background:#333;
}
#wrapper{
display:flex;
height:700px;
max-width:1400px;
margin:0 auto;
}
#map{
flex:1;
}

#sidePanel{
width:340px;
background:#2b2b2b;
border-left:2px solid #444;
overflow-y:auto;
display:flex;
flex-direction:column;
}
#sidePanel img{
width:100%;
display:block;
}
.content{
    padding:14px;
    font-size:13px;
    font-family:'Nunito Basic',sans-serif;
}
.content p{
margin:6px 0;
}
.details-btn{
margin-top:12px;
padding:10px;
background:#444;
color:white;
border:1px solid #666;
border-radius:6px;
cursor:pointer;
width:100%;
}

*{
box-sizing:border-box;
}


/* Entire top ribbon */

#adventureToolbar{
max-width:1400px;
margin:0 auto;
box-sizing:border-box;
position:sticky;
top:0;
z-index:1000;

display:grid;
grid-template-columns:minmax(540px,1fr) auto minmax(540px,1fr);
align-items:center;
gap:20px;

width:100%;
min-width:1280px;
height:58px;
padding:7px 28px 7px 18px;

background:rgb(28, 28, 28);
border-bottom:1px solid #555;
}


/* Allows the ribbon to scroll rather than overlap */

#toolbarScroll{
width:100%;
overflow:visible;
background:#333;
}


/* Left legend */

.type-legend{
    display:flex;
    align-items:center;
    gap:8px;
    justify-self:start;

    font-family:"Playwrite NZ Basic", cursive;
    font-size:15px;
    font-weight:700;
}

.legend-hike{
    color:#6fa8dc;
}

.legend-backpack{
    color:#e06666;
}

.legend-kayak{
    color:#6aa84f;
}

.legend-other{
    color:#ffd966;
}

.legend-separator{
    color:#cfcfcf;
    font-weight:500;
}


/* Truly centered title */

.adventures-title{
grid-column:2;
justify-self:center;

margin:0;

font-size:26px;
font-weight:600;
line-height:1;
text-align:center;
white-space:nowrap;
}


/* Right filters */

#filters{
    width:calc(100% - 80px);
    max-width:1400px;
    margin:0 auto 10px;
    padding:16px 20px;
    box-sizing:border-box;

    display:flex;
    justify-content:center;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:18px;

    background:#333;
    border-radius:10px;
}

#filters label{
display:flex;
align-items:center;
gap:5px;

margin:0;

font-size:13px;
white-space:nowrap;
}

#filters select,
#filters input,
#otherFiltersButton{
font-family:inherit;
font-size:13px;
}

#filters select{
height:32px;
min-width:76px;
padding:4px 7px;

font-size:13px;
color:white;
background:#242424;

border:1px solid #666;
border-radius:5px;
}
#filters input[type="range"]{
    width: 180px;
}
.miles-filter input[type="range"]{
width:82px;
padding:0;
}

#milesValue{
display:inline-block;
min-width:15px;
text-align:right;
}


/* Other Filters dropdown */

.other-filters{
position:relative;
flex:0 0 auto;
}

#otherFiltersButton{
height:30px;
margin:0;
padding:4px 9px;

color:white;
background:#242424;

border:1px solid #666;
border-radius:5px;

cursor:pointer;
white-space:nowrap;
}

#otherFiltersMenu{
position:absolute;
top:calc(100% + 8px);
right:0;

display:none;
width:280px;
padding:15px;

background:#2b2b2b;
border:1px solid #666;
border-radius:8px;

box-shadow:0 8px 20px rgba(0,0,0,.4);
}

#otherFiltersMenu.open{
display:grid;
gap:14px;
}

#otherFiltersMenu label{
display:grid;
align-items:stretch;
gap:5px;

font-size:12px;
}

#otherFiltersMenu select,
#otherFiltersMenu input[type="range"]{
width:100%;
}

#cards-section{
padding:40px;
}
#cards-section h2{
text-align:center;
margin-top: 0px;
font-size:26px;
margin-bottom:30px;
}
#cards-container{
display:grid;
grid-template-columns:repeat(4,340px);
justify-content:center;
gap:25px;
}
@media(max-width:1400px){

#cards-container{
grid-template-columns:repeat(3,320px);
}

}

@media(max-width:1050px){

#cards-container{
grid-template-columns:repeat(2,320px);
}

}

@media(max-width:720px){

#cards-container{
grid-template-columns:minmax(0,320px);
}

}
.trip-card{
background:#2b2b2b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,.3);
}
.trip-card img{
width:100%;
height:220px;
object-fit:cover;
}
.trip-card-type-bar{
height:4px;
width:100%;
border-radius:10px 10px 0 0;
}
.trip-card-content{
padding:18px;
font-family:'Nunito Basic',sans-serif;
}
.trip-card-title{
font-family:"Playwrite NZ Basic", cursive;
font-size:22px;
font-weight:600;
margin-bottom:12px;
}
.trip-card-content p{
margin:5px 0;
font-size:14px;
}
#pagination{
text-align:center;
margin:30px;
}
.page-btn{
margin:3px;
padding:6px 12px;
cursor:pointer;
}
.page-btn.active{
background:#666;
color:white;
}
.panel-title{
    font-family:"Playwrite NZ Basic", cursive;
    font-style:normal;
    font-size:22px;
    font-weight:600;
    margin:14px 0 12px 0;
}
@media(max-width:768px){
#sidePanel{
display:none;
}
#wrapper{
height:500px;
}
#cards-section{
padding:20px;
}
}
#filters,
#filters label,
#filters label span,
#filters select,
#filters input,
#filters option{
    font-family:"Nunito Basic", sans-serif !important;
    font-style:normal !important;
    letter-spacing:normal;
}

#filters label{
    font-weight:600;
}
</style>
</head>
<body>

<div id="toolbarScroll">

<header id="adventureToolbar">

<!-- LEFT: Marker legend -->

<div class="type-legend">
    <span class="legend-hike">Hike</span>
    <span class="legend-separator">/</span>

    <span class="legend-backpack">Backpack</span>
    <span class="legend-separator">/</span>

    <span class="legend-kayak">Kayak</span>
    <span class="legend-separator">/</span>

    <span class="legend-other">Other</span>
</div>

<!-- CENTER: Title -->

<h1 class="adventures-title">Adventures</h1>




</div>

</div>

</header>

</div>    

<div id="wrapper">
<div id="map">

<div id="mapLoading" class="loading-message">
Loading map…
</div>

</div>

<div id="sidePanel">
<div id="panelContent" class="content">
<p>Select a trip</p>
</div>
</div>
</div>

<!-- RIGHT: Filters -->

<div id="filters">

  <label>
    <span>Type:</span>
    <select id="typeFilter">
      <option value="All">All</option>
    </select>
  </label>

  <label>
    <span>Year:</span>
    <select id="yearFilter">
      <option value="All">All</option>
    </select>
  </label>

  <label>
    <span>State:</span>
    <select id="stateFilter">
      <option value="All">All</option>
    </select>
  </label>

  <label>
    <span>Country:</span>
    <select id="countryFilter">
      <option value="All">All</option>
    </select>
  </label>

  <label class="miles-filter">
    <span>Miles ></span>

    <input
      id="milesSlider"
      type="range"
      min="0"
      max="50"
      value="0"
    >

    <span>
      <span id="milesValue">0</span> mi
    </span>
  </label>

  <label class="elevation-filter">
    <span>Elevation gain ></span>

    <input
      id="elevationSlider"
      type="range"
      min="0"
      max="10000"
      step="1000"
      value="0"
    >

    <span>
      <span id="elevationValue">0</span> ft
    </span>
  </label>

</div>

<section id="cards-section">
  <h2>Latest Adventures</h2>
  <div id="cards-container"></div>
</section>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMCxxUBxZ-a2UyHwu5PbKwYBxvAo0bAAA"></script>


<script>

const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:36.805098,lng:-109.822512},
zoom:6,
mapTypeId:google.maps.MapTypeId.TERRAIN,
disableDefaultUI:true,
gestureHandling:"greedy"
});


function isDesktop(){
return window.innerWidth>768;
}


function generatePageUrl(title){
return "trips/"+title.toLowerCase()
.replace(/[^\w\s-]/g,"")
.replace(/\s+/g,"-")+".html";
}


function updatePanel(data){

if(!isDesktop()) return;

const panel=document.getElementById("panelContent");

panel.innerHTML=`

${data.photoUrl ? `<img src="${data.photoUrl}">`:""}

<h2 class="panel-title">${data.title}</h2>
<p><strong>Type:</strong> ${data.type||""}</p>
<p><strong>Where:</strong> ${data.area||""}</p>
<p><strong>Date:</strong> ${data.date||""}</p>
<p><strong>Miles:</strong> ${data.miles||""}</p>
<p><strong>Elevation Gain ft:</strong> ${
  data.elevationGain
    ? Number(String(data.elevationGain).replace(/,/g, "")).toLocaleString()
    : ""
}</p>
<p><strong>Overall Ranking:</strong> ${data.overallRanking||""}</p>

<button class="details-btn">Details</button>

`;

panel.querySelector(".details-btn").onclick=(e)=>{
e.stopPropagation();
window.open(generatePageUrl(data.title),"_blank");
};

panel.onclick=()=>{
window.open(generatePageUrl(data.title),"_blank");
};

}



function getMarkerIcon(type){

switch((type||"").toLowerCase()){

case "hike":
return "http://maps.google.com/mapfiles/ms/icons/blue-dot.png";

case "backpack":
return "http://maps.google.com/mapfiles/ms/icons/red-dot.png";

case "kayak":
return "http://maps.google.com/mapfiles/ms/icons/green-dot.png";

case "other":
return "http://maps.google.com/mapfiles/ms/icons/yellow-dot.png";

default:
return null;

}

}



let allMarkers=[];
let allData=[];
let filteredData=[];
let currentPage=1;



function createCards(trips){

const container=document.getElementById("cards-container");
container.innerHTML="";

const perPage=16;

const sorted=[...trips].sort((a,b)=>new Date(b.date)-new Date(a.date));

const totalPages=Math.ceil(sorted.length/perPage);

if(currentPage>totalPages) currentPage=1;

const start=(currentPage-1)*perPage;


sorted.slice(start,start+perPage).forEach(d=>{

const card=document.createElement("div");

card.className="trip-card";

card.innerHTML=`

<div
class="trip-card-type-bar"
style="background:${
d.type === "Hike" ? "#2d72d9" :
d.type === "Backpack" ? "#d83a34" :
d.type === "Kayak" ? "#36a852" :
d.type === "Other" ? "#f2cf3a" :
"#777"
};">
</div>

${d.photoUrl ? `<img src="${d.photoUrl}">`:""}

<div class="trip-card-content">

<div class="trip-card-title">${d.title}</div>

<p><strong>Type:</strong> ${d.type||""}</p>
<p><strong>Where:</strong> ${d.area||""}</p>
<p><strong>Date:</strong> ${d.date||""}</p>
<p><strong>Miles:</strong> ${d.miles||""}</p>
<p><strong>Elevation Gain ft:</strong> ${
  d.elevationGain
    ? Number(String(d.elevationGain).replace(/,/g, "")).toLocaleString()
    : ""
}</p>
<p><strong>Overall Ranking:</strong> ${d.overallRanking||""}</p>

</div>
`;

card.onclick=()=>{
window.open(generatePageUrl(d.title),"_blank");
};

container.appendChild(card);

});

createPagination(totalPages);

}

function createPagination(totalPages){

let old=document.getElementById("pagination");
if(old) old.remove();

const div=document.createElement("div");
div.id="pagination";

for(let i=1;i<=totalPages;i++){

const btn=document.createElement("button");

btn.className="page-btn";
btn.innerText=i;

if(i===currentPage){
btn.classList.add("active");
}

btn.onclick=()=>{

currentPage=i;

createCards(filteredData);

document.getElementById("cards-section")
.scrollIntoView({
behavior:"smooth"
});

};

div.appendChild(btn);

}

document.getElementById("cards-container").before(div);

}



function populateFilters(){

function addOptions(id,values){

const select=document.getElementById(id);

[...new Set(values.filter(v=>v!==undefined && v!==null && v!==""))]
.sort()
.forEach(v=>{

const option=document.createElement("option");

option.value=v;
option.textContent=v;

select.appendChild(option);

});

}


addOptions("typeFilter",allData.map(x=>x.type));

addOptions("yearFilter",
allData.map(x=>new Date(x.date).getFullYear())
);

addOptions("stateFilter",allData.map(x=>x.state));

addOptions("countryFilter",allData.map(x=>x.country));

}

function applyFilters(){

filteredData=allData.filter(d=>{


let type=document.getElementById("typeFilter").value;

let year=document.getElementById("yearFilter").value;

let state=document.getElementById("stateFilter").value;

let country=document.getElementById("countryFilter").value;

let milesSlider=
Number(document.getElementById("milesSlider").value);

let elevationSlider=
Number(document.getElementById("elevationSlider").value);


let miles=Number(d.miles)||0;

let elevation=parseInt(d.elevationGain)||0;



if(type!=="All" && d.type!==type)
return false;


if(year!=="All" &&
new Date(d.date).getFullYear()!=Number(year))
return false;


if(state!=="All" && d.state!==state)
return false;


if(country!=="All" && d.country!==country)
return false;


if(miles < milesSlider)
return false;


if(elevation < elevationSlider)
return false;


return true;


});


createCards(filteredData);


/* Make marker filtering faster */

const filteredSet=new Set(filteredData);

allMarkers.forEach(marker=>{

marker.setMap(
filteredSet.has(marker.data)
?map
:null
);

});

}



document.querySelectorAll("#filters select")
.forEach(select=>{

select.addEventListener("change",()=>{

currentPage=1;
applyFilters();

});

});



document.getElementById("milesSlider")
.addEventListener("input",function(){

document.getElementById("milesValue").innerText=this.value;

currentPage=1;

applyFilters();

});



document.getElementById("elevationSlider")
.addEventListener("input",function(){

document.getElementById("elevationValue").innerText=this.value;

currentPage=1;

applyFilters();

});






async function loadMarkers(){

const res=await fetch(
"https://script.google.com/macros/s/AKfycbxmcar1lRakOBIXfemcSlT_9yMDL5ZVcrEeKs1tr7cuEoD6I8T6Y8_wLR-FHGbAm0zF/exec"
);

const data=await res.json();


allData=data.mapMarkers;

filteredData=allData;


populateFilters();

createCards(allData);



let mostRecent=null;


allData.forEach(d=>{

  if (!d.position) {
    console.warn("Missing map position:", d.title);
    return;
  }

  const marker=new google.maps.Marker({
    position:d.position,
    map,
    icon:getMarkerIcon(d.type)
  });


marker.type=d.type;

marker.data=d;


marker.addListener("click",()=>{

updatePanel(d);

});


allMarkers.push(marker);



if(!mostRecent ||
new Date(d.date)>new Date(mostRecent.date)){

mostRecent=d;

}


});



if(isDesktop() && mostRecent){

updatePanel(mostRecent);

}


}



loadMarkers();


</script>

</body>
</html>
